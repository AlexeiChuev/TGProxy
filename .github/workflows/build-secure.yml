name: Build Secure Windows Proxy

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pyarmor==8.5.10 customtkinter
          pip install -e .[win10]

      - name: Inject Secret Salt
        shell: bash
        run: |
          # Вставляем твой секрет в код
          sed -i "s/REPLACE_ME_SECRET_SALT/${{ secrets.PROXY_SECRET_SALT }}/g" proxy/hwid_auth.py

      - name: Obfuscate Code
        shell: cmd
        run: |
          :: Шифруем только hwid_auth.py
          pyarmor gen -O obf_dist proxy/hwid_auth.py
          
          :: Копируем зашифрованный файл обратно (теперь через CMD)
          copy /Y obf_dist\hwid_auth.py proxy\hwid_auth.py
          
          :: Копируем папку runtime. /S /E /I /Y - ключи для копирования папок
          xcopy obf_dist\pyarmor_runtime_000000 proxy\pyarmor_runtime_000000 /S /E /I /Y

      - name: Build with PyInstaller
        run: |
          :: Собираем EXE. PyInstaller упакует всё вместе
          pyinstaller packaging/windows.spec

      - name: Upload Secure EXE
        uses: actions/upload-artifact@v4
        with:
          name: TgWsProxy_Secure_Windows
          path: dist/*.exe
